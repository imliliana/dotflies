$mainMod = SUPER
$term = kitty
$menu = wofi --show drun
$fileManager = thunar
$wsaction = fish ~/.config/hypr/scripts/wsaction.fish
$kbMoveWinToWs = Super+Shift
 
monitor =, 1920x1080@60.00Hz, auto, auto

$base      = rgb(1a1614)
$text      = rgb(f4e7d3)
$accent    = rgb(eeb96a)
$subtle    = rgb(8ec0be)
$urgent    = rgb(d65d0e)

exec-once = waybar
exec-once = nm-applet --indicator
exec-once = awww-daemon

exec-once = hyprctl setcursor miku-cursor-linux 32
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'miku-cursor-linux'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 32
exec-once = systemctl --user import-environment XCURSOR_SIZE XCURSOR_THEME DBUS_SESSION_BUS_ADDRESS

general {
    gaps_in = 2
    gaps_out = 2
    border_size = 2
    
    col.active_border = $accent
    col.inactive_border = $base
    
    layout = dwindle
}

decoration {
    rounding = 0
    
    shadow {
        enabled = false
    }
}

input {
    kb_layout = br
    numlock_by_default = true

    touchpad {
        tap-to-click = true
        natural_scroll = true
        middle_button_emulation = true
    }
}

bind = $mainMod, S, exec, $term
bind = $mainMod, X, killactive,                  
bind = $mainMod, D, exec, $menu
bind = $mainMod SHIFT, C, exec, hyprctl reload  
bind = $mainMod SHIFT, E, exec, hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, fullscreen, 0
bind = $mainMod, B, togglefloating,
bind = $mainMod, Space, focuscurrentorlast
bind = $mainMod, W, exec, wofipaper
bind = $mainMod, Z, exec, swaync-client -t
bind = $mainMod, L, exec, hyprlock
bind = , Print, exec, hyprshot -m region -z --clipboard-only

bind = $mainMod, Left,  movefocus , l
bind = $mainMod, Down,  movefocus, d
bind = $mainMod, Up,    movefocus, u
bind = $mainMod, Right, movefocus, r
bind = $mainMod SHIFT, Left,  movewindow, l
bind = $mainMod SHIFT, Down,  movewindow, d
bind = $mainMod SHIFT, Up,    movewindow, u
bind = $mainMod SHIFT, Right, movewindow, r

bind = $kbMoveWinToWs, 1, exec, $wsaction movetoworkspace 1
bind = $kbMoveWinToWs, 2, exec, $wsaction movetoworkspace 2
bind = $kbMoveWinToWs, 3, exec, $wsaction movetoworkspace 3
bind = $kbMoveWinToWs, 4, exec, $wsaction movetoworkspace 4
bind = $kbMoveWinToWs, 5, exec, $wsaction movetoworkspace 5
bind = $kbMoveWinToWs, 6, exec, $wsaction movetoworkspace 6
bind = $kbMoveWinToWs, 7, exec, $wsaction movetoworkspace 7
bind = $kbMoveWinToWs, 8, exec, $wsaction movetoworkspace 8
bind = $kbMoveWinToWs, 9, exec, $wsaction movetoworkspace 9
bind = $kbMoveWinToWs, 0, exec, $wsaction movetoworkspace 10

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse:274, togglefloating
bind = $mainMod SHIFT, Space, togglefloating

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod, 1, movetoworkspace, 1
bind = $mainMod, 2, movetoworkspace, 2
bind = $mainMod, 3, movetoworkspace, 3
bind = $mainMod, 4, movetoworkspace, 4
bind = $mainMod, 5, movetoworkspace, 5
bind = $mainMod, 6, movetoworkspace, 6
bind = $mainMod, 7, movetoworkspace, 7
bind = $mainMod, 8, movetoworkspace, 8
bind = $mainMod, 9,  movetoworkspace, 9
bind = $mainMod, 0, movetoworkspace, 10

binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
binde = , XF86MonBrightnessUp, exec, light -A 5
binde = , XF86MonBrightnessDown, exec, light -U 5
bind = $mainMod, R, submap, resize

submap = resize
    binde = , Left,  resizeactive, -10 0
    binde = , Down,  resizeactive, 0 10
    binde = , Up,    resizeactive, 0 -10
    binde = , Right, resizeactive, 10 0
    
    bind = , Return, submap, reset
    bind = , Escape, submap, reset
submap = reset

windowrule = float on, match:title ^(Preferences)$
windowrule = float on, match:title ^(Preferences)$
windowrule = float on, match:title ^(Task Dialog)$
windowrule = float on, match:class ^(pop-up)$

windowrule = float on, match:class ^(waypaper)$

windowrule {
    name = gd-fix
    match:class = steam_app_322170
    fullscreen = true
    fullscreen_state = 2 2
    suppress_event = fullscreen maximize activate activatefocus
    stay_focused = true
    no_blur = true
    no_shadow = true
    opacity = 1.0
}
